name: Continuous Integration
on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  actions: read

jobs:
  unit-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-intel, macos-arm, windows-latest]
        go-version: ["oldstable", "stable"]
        include:
          - os: macos-intel
            runsOn: macos-15-intel
          - os: macos-arm
            runsOn: macos-14
    permissions:
      contents: read
      checks: write
      statuses: write
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      # TODO before merge: restore the real checkout/setup/check/unit-test steps.
      - name: Temporary CI history validation
        run: echo "hello world from unit-test"

  integration-test-no-cache:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-intel, macos-arm, windows-latest]
        go-version: ["oldstable", "stable"]
        include:
          - os: macos-intel
            runsOn: macos-15-intel
          - os: macos-arm
            runsOn: macos-14
    permissions:
      contents: read
      checks: write
      statuses: write
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      # TODO before merge: restore the real checkout/setup/integration-test steps.
      - name: Temporary CI history validation
        run: echo "hello world from integration-test-no-cache"

  integration-test-with-cache:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-intel, macos-arm, windows-latest]
        go-version: ["oldstable", "stable"]
        include:
          - os: macos-intel
            runsOn: macos-15-intel
          - os: macos-arm
            runsOn: macos-14
    permissions:
      contents: read
      checks: write
      statuses: write
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      # TODO before merge: restore the real checkout/setup/integration-test steps.
      - name: Temporary CI history validation
        run: echo "hello world from integration-test-with-cache"

  docker-compose-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      statuses: write
    steps:
      # TODO before merge: restore the real checkout/setup/docker compose test steps.
      - name: Temporary CI history validation
        run: echo "hello world from docker-compose-test"

  cloud-test:
    strategy:
      matrix:
        go-version: ["oldstable", "stable"]
        fips: [true, false]
      # Try to avoid running tests in parallel to avoid workflow ID conflict
      max-parallel: 1
    # Only supported in non-fork runs, since secrets are not available in forks.
    runs-on: ubuntu-latest
    env:
      SERVICE_ADDR: sdk-ci.a2dd6.tmprl.cloud:7233
      TEMPORAL_NAMESPACE: sdk-ci.a2dd6
      TEMPORAL_CLIENT_CERT: ${{ secrets.TEMPORAL_CLIENT_CERT }}
      TEMPORAL_CLIENT_KEY: ${{ secrets.TEMPORAL_CLIENT_KEY }}
      GODEBUG: ${{ matrix.fips && 'fips140=on' || '' }}

    steps:
      # TODO before merge: restore the real checkout/setup/cloud integration test steps.
      - name: Temporary CI history validation
        run: echo "hello world from cloud-test"

  features-test:
    # TODO before merge: restore the real temporalio/features reusable workflow call.
    runs-on: ubuntu-latest
    steps:
      - name: Temporary CI history validation
        run: echo "hello world from features-test"

  ci-history-validation-failure:
    name: CI History Validation Failure
    # TODO before merge: remove this intentionally failing PR-only job.
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail quickly for CI history validation
        run: |
          echo "Intentional PR-only failure to validate CI history summary rendering."
          exit 1

  ci-history:
    name: CI History Summary
    needs:
      - unit-test
      - integration-test-no-cache
      - integration-test-with-cache
      - docker-compose-test
      - cloud-test
      - features-test
      - ci-history-validation-failure
    # TODO before merge: remove this PR validation path and restore post-merge monitoring only.
    # The final configuration should query main/master push runs, not pull_request branch history.
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'pull_request') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      CI_HISTORY_WORKFLOW_FILE: ci.yml
      CI_HISTORY_TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      CI_HISTORY_EVENT: ${{ github.event_name == 'pull_request' && 'pull_request' || 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Write CI history summary
        run: bash .github/scripts/ci-history-summary.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
