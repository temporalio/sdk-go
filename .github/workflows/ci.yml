name: Continuous Integration
on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  actions: read

jobs:
  unit-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-intel, macos-arm, windows-latest]
        go-version: ["oldstable", "stable"]
        include:
          - os: macos-intel
            runsOn: macos-15-intel
          - os: macos-arm
            runsOn: macos-14
    permissions:
      contents: read
      checks: write
      statuses: write
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      - name: Temporary fast pass
        run: echo "Temporarily passing unit-test to verify CI history summary."

  integration-test-no-cache:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-intel, macos-arm, windows-latest]
        go-version: ["oldstable", "stable"]
        include:
          - os: macos-intel
            runsOn: macos-15-intel
          - os: macos-arm
            runsOn: macos-14
    permissions:
      contents: read
      checks: write
      statuses: write
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      - name: Temporary intentional failure
        run: |
          echo "Temporarily failing integration-test-no-cache to verify CI history summary still runs."
          exit 1

  integration-test-with-cache:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-intel, macos-arm, windows-latest]
        go-version: ["oldstable", "stable"]
        include:
          - os: macos-intel
            runsOn: macos-15-intel
          - os: macos-arm
            runsOn: macos-14
    permissions:
      contents: read
      checks: write
      statuses: write
    runs-on: ${{ matrix.runsOn || matrix.os }}
    steps:
      - name: Temporary fast pass
        run: echo "Temporarily passing integration-test-with-cache to verify CI history summary."

  docker-compose-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      statuses: write
    steps:
      - name: Temporary fast pass
        run: echo "Temporarily passing docker-compose-test to verify CI history summary."

  cloud-test:
    strategy:
      matrix:
        go-version: ["oldstable", "stable"]
        fips: [true, false]
      # Try to avoid running tests in parallel to avoid workflow ID conflict
      max-parallel: 1
    # Only supported in non-fork runs, since secrets are not available in forks.
    if: ${{ github.event.pull_request.head.repo.full_name == '' || github.event.pull_request.head.repo.full_name == 'temporalio/sdk-go' }}
    runs-on: ubuntu-latest
    env:
      SERVICE_ADDR: sdk-ci.a2dd6.tmprl.cloud:7233
      TEMPORAL_NAMESPACE: sdk-ci.a2dd6
      TEMPORAL_CLIENT_CERT: ${{ secrets.TEMPORAL_CLIENT_CERT }}
      TEMPORAL_CLIENT_KEY: ${{ secrets.TEMPORAL_CLIENT_KEY }}
      GODEBUG: ${{ matrix.fips && 'fips140=on' || '' }}

    steps:
      - name: Temporary fast pass
        run: echo "Temporarily passing cloud-test to verify CI history summary."

  features-test:
    runs-on: ubuntu-latest
    steps:
      - name: Temporary fast pass
        run: echo "Temporarily passing features-test to verify CI history summary."

  ci-history:
    name: CI History Summary
    needs:
      - unit-test
      - integration-test-no-cache
      - integration-test-with-cache
      - docker-compose-test
      - cloud-test
      - features-test
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'pull_request') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      CI_HISTORY_WORKFLOW_FILE: ci.yml
      CI_HISTORY_TARGET_BRANCH: ${{ github.base_ref || github.ref_name }}
      CI_HISTORY_EVENT: push
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: Write CI history summary
        run: go run ./.github/tools/ci-history-summary/main.go
        env:
          GITHUB_TOKEN: ${{ github.token }}
